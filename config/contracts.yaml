# config/contracts.yaml — shipped defaults; copied to $CLONE_WARS_HOME on first medic run.
# Each provider row has:
#   binary:           CLI executable name (must be on PATH)
#   modes:            map of mode-name -> args list passed to the CLI
#                     two modes are reserved: 'full' (yolo/bypass) and 'read-only'
#   default_mode:     mode used by /clone-wars:spawn when --mode is omitted
#   ready_timeout_s:  how long /clone-wars:spawn waits for the trooper's "ready"
#                     event in outbox.jsonl before giving up
#   identity_injection: how Master Yoda delivers identity.md to the pane
#                       (send-keys-paste = tmux load-buffer + paste-buffer + Enter)
#
# Modes that have no native equivalent on a given provider are shipped as best-effort
# (gemini approximates read-only via --approval-mode default; claude approximates it via
# --permission-mode plan).

codex:
  binary: codex
  modes:
    full:      [--dangerously-bypass-approvals-and-sandbox]
    read-only: [--sandbox, read-only]
  default_mode: full
  ready_timeout_s: 90
  # bootstrap_sleep_s bumped 8 → 20 to absorb codex's cold-start node-modules
  # + auth-handshake. Earlier 8s tripped a race where spawn.sh's identity-read
  # nudge arrived before codex was draining its TTY, leading to silent buffer
  # drops + ready-timeout. Warm starts are unaffected (the sleep is a floor
  # before the nudge fires). See commands/consult.md Step 1 spawn-rollback
  # for the directive-side auto-retry-once that complements this change.
  bootstrap_sleep_s: 20
  identity_injection: send-keys-paste

gemini:
  binary: gemini
  modes:
    full:      [--approval-mode, yolo]
    read-only: [--approval-mode, default]   # best-effort; gemini has no true read-only
  default_mode: full
  ready_timeout_s: 30
  bootstrap_sleep_s: 8
  identity_injection: send-keys-paste

claude:
  binary: claude
  modes:
    full:      [--permission-mode, auto]
    read-only: [--permission-mode, plan]     # best-effort; plan mode is read-only-ish
  default_mode: full
  ready_timeout_s: 60
  bootstrap_sleep_s: 12
  identity_injection: send-keys-paste

opencode:
  binary: opencode
  modes:
    # opencode has no permission flag; full and read-only use the same row.
    full:      [-m, deepseek/deepseek-v4-pro]
    read-only: [-m, deepseek/deepseek-v4-pro]
  default_mode: full
  # ready_timeout_s: pre-tracer-measurement estimate; 4x bootstrap leaves margin.
  ready_timeout_s: 60
  # bootstrap_sleep_s: matches tracer scaffold; conservative initial value.
  bootstrap_sleep_s: 15
  identity_injection: send-keys-paste
  # v0.35.0: DeepSeek V4 Pro is wall-clock slower than codex/claude; multiply
  # per-kind consult timeouts by this factor before the liveness probe kicks in.
  # Closes the false-FS=timeout symptom hit during /clone-wars:consult when
  # wolffe recorded timeout while findings.md was 18 KB and the pane was
  # visibly working. See docs/superpowers/specs/2026-05-16-v0.35.0-trooper-
  # liveness-design.md for the full design.
  timeout_multiplier: 2.5

consult:
  research_timeout_s: 600   # 10 min
  verify_timeout_s:   300   # 5 min
